<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DhukiPCT | Live Sports Hub</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1e;
    color: white;
    text-align: center;
}

/* 🔥 HEADER */
.header {
    padding: 20px;
}

.brand {
    font-size: 40px;
    font-weight: bold;
    background: linear-gradient(90deg,#00ffcc,#00aaff,#ff4d6d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 3s infinite linear;
}

@keyframes glow {
    0% { filter: drop-shadow(0 0 5px #00ffcc); }
    50% { filter: drop-shadow(0 0 15px #ff4d6d); }
    100% { filter: drop-shadow(0 0 5px #00aaff); }
}

/* 🎥 PLAYER */
video {
    width: 90%;
    max-width: 900px;
    border-radius: 12px;
    margin-top: 10px;
}

/* 🎮 BUTTONS */
button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #00ffcc;
    font-weight: bold;
}

button:hover {
    background: #00ffaa;
}

/* 💬 CHAT */
#chatBox {
    width: 90%;
    max-width: 900px;
    height: 200px;
    margin: 20px auto;
    background: #111;
    overflow-y: auto;
    padding: 10px;
    border-radius: 10px;
    text-align: left;
}

input {
    width: 60%;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

/* 🏷 CORNER */
.corner {
    position: fixed;
    top: 10px;
    left: 10px;
    background: #ff4d6d;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 12px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="corner">Dhuki -PCT</div>

<div class="header">
    <div class="brand">DhukiPCT</div>
    <p>Live Sports Streaming Platform</p>
</div>

<!-- 🎥 STREAM PLAYER -->
<video id="player" controls autoplay></video>

<br>

<!-- 🎬 STREAM SWITCH -->
<button onclick="loadStream(0)">Stream 1</button>
<button onclick="loadStream(1)">Stream 2</button>
<button onclick="loadStream(2)">Stream 3</button>

<br>

<!-- 💬 CHAT -->
<h3>💬 Live Chat</h3>

<div id="chatBox"></div>

<input id="msg" placeholder="Type message...">
<button onclick="sendMsg()">Send</button>

<script>
const streams = [
    "http://edge.zerobuff.com/c444a5102cec035ec1783630a30c434ffeebd61d5b96fbe2b89f21e6e6829e930f218ad495cb31a665cfe9e154de5925e6fe349a5f261c42a631f2e162981bacd2c2c101c6291c11221891e443ee2be0b4ffa58b190638e5db21df780f118e4143/index.m3u8",
    "http://edge.zerobuff.com/c444a5102cec035ec1783635a00c434ffeebd61d5b96fbe2bc9f21e7eb959f85042eb3b1fbc057d32ccbf6ee54dd5925e4e82b9e583d0157af29f2f77d9c1ab39cc9dc07cc2f51177013c1b440bf7cb4e5aaa48e1d5739e68528dd710a47d4114458bf868cf446/index.m3u8",
    "http://edge.zerobuff.top/c444a5102cec035ec1783537a50c434ffeebd61d5b96fbe2bd8e3ef1eba1a4a02b0a81bac78076f43b9fb3ab4bdd553efbeb30825b261f42ab33e0e87a9b0cac9bc9dc04cd311c1f725c97b010be2de6e1ada4d81b0539e08c24de29534d8e164609ebd6def3163f27f5/index.m3u8"
];

let video = document.getElementById("player");
let hls;

/* 🎥 LOAD STREAM */
function loadStream(i){
    if(hls) hls.destroy();

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(streams[i]);
        hls.attachMedia(video);
    } else {
        video.src = streams[i];
    }
}

/* 💬 CHAT (LOCAL ONLY) */
function sendMsg(){
    let msg = document.getElementById("msg").value;
    if(msg.trim() === "") return;

    let box = document.getElementById("chatBox");
    box.innerHTML += "<div>👤 " + msg + "</div>";

    document.getElementById("msg").value = "";
    box.scrollTop = box.scrollHeight;
}

/* AUTO LOAD */
loadStream(0);
</script>

</body>
</html>
