<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DhukiPCT | Live Sports Hub</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1e;
    color: white;
    text-align: center;
}

/* 🔥 HEADER */
.header {
    padding: 20px;
}

.brand {
    font-size: 40px;
    font-weight: bold;
    background: linear-gradient(90deg,#00ffcc,#00aaff,#ff4d6d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: glow 3s infinite linear;
}

@keyframes glow {
    0% { filter: drop-shadow(0 0 5px #00ffcc); }
    50% { filter: drop-shadow(0 0 15px #ff4d6d); }
    100% { filter: drop-shadow(0 0 5px #00aaff); }
}

/* 🎥 PLAYER */
video {
    width: 90%;
    max-width: 900px;
    border-radius: 12px;
    margin-top: 10px;
}

/* 🎮 BUTTONS */
button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #00ffcc;
    font-weight: bold;
}

button:hover {
    background: #00ffaa;
}

/* 💬 CHAT */
#chatBox {
    width: 90%;
    max-width: 900px;
    height: 200px;
    margin: 20px auto;
    background: #111;
    overflow-y: auto;
    padding: 10px;
    border-radius: 10px;
    text-align: left;
}

input {
    width: 60%;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

/* 🏷 CORNER */
.corner {
    position: fixed;
    top: 10px;
    left: 10px;
    background: #ff4d6d;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 12px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="corner">Dhuki -PCT</div>

<div class="header">
    <div class="brand">DhukiPCT</div>
    <p>Live Sports Streaming Platform</p>
</div>

<!-- 🎥 STREAM PLAYER -->
<video id="player" controls autoplay></video>

<br>

<!-- 🎬 STREAM SWITCH -->
<button onclick="loadStream(0)">Stream 1</button>
<button onclick="loadStream(1)">Stream 2</button>
<button onclick="loadStream(2)">Stream 3</button>

<br>

<!-- 💬 CHAT -->
<h3>💬 Live Chat</h3>

<div id="chatBox"></div>

<input id="msg" placeholder="Type message...">
<button onclick="sendMsg()">Send</button>

<script>
const streams = [
    "http://152.233.35.239/5fe4bf4471c8e39b39fb18214daa75c31e2b7599ed278748c0b57091fc589b2cc689b5/mono.m3u8?token=a515272a689c21155c5df8fcf496d28c",
    "http://152.233.35.239/5fe4bf4471c8e39b39fb18214a8252f0300f5686f0218009b8c87199f25f912bcb83b1ad51a9/mono.m3u8?token=bd584ed407b1fa963b40cad998785ee7",
    "http://152.233.35.239/5fe4bf4471c8e39b39fb18214e8047cf2f177782ec10861393e726ddf95c902fc786b5a659a4018e/mono.m3u8?token=7fda671e7f6c67268fd0251a0b93971a"
];

let video = document.getElementById("player");
let hls;

/* 🎥 LOAD STREAM */
function loadStream(i){
    if(hls) hls.destroy();

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(streams[i]);
        hls.attachMedia(video);
    } else {
        video.src = streams[i];
    }
}

/* 💬 CHAT (LOCAL ONLY) */
function sendMsg(){
    let msg = document.getElementById("msg").value;
    if(msg.trim() === "") return;

    let box = document.getElementById("chatBox");
    box.innerHTML += "<div>👤 " + msg + "</div>";

    document.getElementById("msg").value = "";
    box.scrollTop = box.scrollHeight;
}

/* AUTO LOAD */
loadStream(0);
</script>

</body>
</html>
